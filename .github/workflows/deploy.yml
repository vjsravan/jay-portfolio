name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Strip any company-scoped auth tokens that may have leaked via
      # package-lock.json or a global .npmrc on the developer's machine
      - name: Force public npm registry (clear company auth)
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete //registry.npmjs.org/:_authToken || true
          npm config delete _authToken || true

      - name: Install dependencies
        run: npm install --registry https://registry.npmjs.org/
        working-directory: portfolio-app

      - name: Type check
        run: npx tsc -b
        working-directory: portfolio-app

      - name: Vite build
        run: npx vite build
        working-directory: portfolio-app
        env:
          VITE_BASE_PATH: /jay-portfolio/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio-app/dist

  # ── 2. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

